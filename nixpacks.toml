# Railway Nixpacks build config for Liberaspace
# https://nixpacks.com/docs/providers/php

providers = ["php"]

[phases.setup]
nixPkgs = ["nodejs_22", "php84", "php84Packages.composer"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "composer install --no-dev --no-interaction --optimize-autoloader --no-progress",
  # npm ci だと Rolldown の platform-specific optional deps が抜ける既知バグを踏むため
  # npm install を使う (lock ファイルは尊重される)。
  "npm install --no-audit --no-fund",
]

[phases.build]
dependsOn = ["install"]
cmds = [
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
]

# Release: run migrations (safe and idempotent), then serve.
# Initial seeding is a manual one-shot: `railway run php artisan db:seed --force`
[start]
cmd = "php artisan migrate --force && php artisan serve --host 0.0.0.0 --port $PORT"
